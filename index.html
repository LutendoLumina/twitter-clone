<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <aside class="col-3 border-end sidebar">

                <div class="logo">
                    <a href="http://127.0.0.1:5500/index.html">
                        <img src="assets/icons/x-logo.svg" alt="twitter logo">
                    </a>
                </div>

                <div class="sidebar-menu p-3">

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-house-door fs-4 me-3"></i>
                            <span>Home</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-search fs-4 me-3"></i>
                            <span>Explore</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-bell fs-4 me-3"></i>
                            <span>Notifications</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-person-add fs-4 me-3"></i>
                            <span>Follow</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-envelope fs-4 me-3"></i>
                            <span>Chat</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <img src="assets/icons/grok.svg" width="23" class="me-3">
                            <span>Grok</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-bookmark fs-4 me-3"></i>
                            <span>Bookmarks</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <img src="assets/icons/x-logo.svg" width="23" class="me-3">
                            <span>Premium</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-person fs-4 me-3"></i>
                            <span>Profile</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-three-dots fs-4 me-3"></i>
                            <span>More</span>
                        </a>
                    </div>

                    <div class="post-button">
                        <button class="btn btn-primary btn-lg">Post</button>
                    </div>

                    <footer>
                        <a href="#" class="profile-card text-dark text-decoration-none">
                            <div class="profile-left">
                                <div class="avatar">L</div>
                                <div class="profile-info">
                                    <div class="profile-name">Lumina</div>
                                    <div class="profile-handle">@LuthandoPrecio3</div>
                                </div>
                            </div>

                            <div class="profile-more">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </a>
                    </footer>

                </div>
            </aside>

            <!-- Main Feed -->
            <main class="col-6 main-feed p-0">

                <!-- top bar -->
                <div class="feed-header">
                    <h5>For you</h5>
                    <h5>Following</h5>
                </div>

                <!-- post composer -->
                <div class="composer">

                    <div class="composer-left">
                        <div class="composer-avatar">L</div>
                    </div>

                    <div class="composer-right">
                        <textarea name="tweetInput" class="comp"></textarea>
                    </div>
                </div>



            </main>

            <!-- Right Panel -->
            <section class="col-3 p-3">
                <h3>Trends</h3>
            </section>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
