<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR SECTION -->
            <aside class="col-3 border-end sidebar">

                <div class="logo">
                    <a href="http://127.0.0.1:5500/index.html">
                        <img src="assets/icons/x-logo.svg" alt="twitter logo">
                    </a>
                </div>

                <div class="sidebar-menu p-3">

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-house-door fs-4 me-3"></i>
                            <span>Home</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-search fs-4 me-3"></i>
                            <span>Explore</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-bell fs-4 me-3"></i>
                            <span>Notifications</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-person-add fs-4 me-3"></i>
                            <span>Follow</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-envelope fs-4 me-3"></i>
                            <span>Chat</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <img src="assets/icons/grok.svg" width="23" class="me-3">
                            <span>Grok</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-bookmark fs-4 me-3"></i>
                            <span>Bookmarks</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <img src="assets/icons/x-logo.svg" width="23" class="me-3">
                            <span>Premium</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-person fs-4 me-3"></i>
                            <span>Profile</span>
                        </a>
                    </div>

                    <div class="sidebar-item">
                        <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                            <i class="bi bi-three-dots fs-4 me-3"></i>
                            <span>More</span>
                        </a>
                    </div>

                    <div class="post-button">
                        <button class="btn btn-dark btn-lg">Post</button>
                    </div>

                    <footer>
                        <a href="#" class="profile-card text-dark text-decoration-none">
                            <div class="profile-left">
                                <div class="avatar">L</div>
                                <div class="profile-info">
                                    <div class="profile-name">Lumina</div>
                                    <div class="profile-handle">@LuthandoPrecio3</div>
                                </div>
                            </div>

                            <div class="profile-more">
                                <i class="bi bi-three-dots"></i>
                            </div>
                        </a>
                    </footer>

                </div>
            </aside>

            <!-- Main SECTION -->
            <main class="col-6 main-feed p-0">

                <!-- top bar -->
                <div class="feed-header">

                    <div class="feed-tabs">
                        <div class="tab active">For you</div>
                        <div class="tab">Following</div>
                    </div>

                </div>

                <!-- post composer -->
                <div class="composer">

                    <div class="composer-left">
                        <div class="composer-avatar">L</div>
                    </div>

                    <div class="composer-right">
                        <textarea name="tweetInput" class="composer-input" placeholder="What's happening?"></textarea>

                        <div class="composer-actions">

                            <div class="composer-icons">
                                <i class="bi bi-image"></i>
                                <i class="bi bi-filetype-gif"></i>
                                <i class="bi bi-bar-chart"></i>
                                <i class="bi bi-emoji-smile"></i>
                                <i class="bi bi-calendar-event"></i>
                                <i class="bi bi-geo-alt"></i>
                            </div>

                            <div class="tweet-button">
                                <button id="tweetBtn" class="btn btn-secondary rounded-pill px-4 fw-bold">Post</button>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="show-posts">
                    <a href="#">Show 840 posts</a>
                </div>

                <div class="tweet-feed">
                    <div class="tweet-card">

                        <div class="tweet-left">
                            <img src="assets/moe.jpg" alt="Profile" class="tweet-avatar">
                        </div>

                        <div class="tweet-right">

                            <div class="tweet-top-row">

                                <div class="tweet-user-info">
                                    <span class="tweet-name">Minister of Electricity 🇿🇦</span>
                                    <i class="bi bi-patch-check-fill verified-badge"></i>
                                    <span class="tweet-handle">@VITO_G_Wagon</span>
                                    <span class="tweet-dot">·</span>
                                    <span class="tweet-time">10h</span>
                                </div>

                                <div class="tweet-top-icons">
                                    <i class="bi bi-slash-circle"></i>
                                    <i class="bi bi-three-dots"></i>
                                </div>

                            </div>

                            <!-- TEXT -->
                            <div class="tweet-text">
                                Musa Khawula ?
                            </div>

                            <!-- IMAGE -->
                            <div class="tweet-media">
                                <img src="assets/kick-bucket.jpg" alt="Tweet image">
                            </div>

                            <!-- ACTIONS -->
                            <div class="tweet-actions">

                                <div class="tweet-action">
                                    <i class="bi bi-chat"></i>
                                    <span>44</span>
                                </div>

                                <div class="tweet-action">
                                    <i class="bi bi-repeat"></i>
                                    <span>23</span>
                                </div>

                                <div class="tweet-action">
                                    <i class="bi bi-heart"></i>
                                    <span>1.2K</span>
                                </div>

                                <div class="tweet-action">
                                    <i class="bi bi-bar-chart"></i>
                                    <span>214K</span>
                                </div>

                                <div class="tweet-action-group-right">
                                    <i class="bi bi-bookmark"></i>
                                    <i class="bi bi-box-arrow-up"></i>
                                </div>

                            </div>

                        </div>
                    </div>
                </div>

            </main>

            <!-- Right Panel -->
            <section class="col-3 p-3">
                <h3>Trends</h3>
            </section>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
