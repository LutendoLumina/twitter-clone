<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Clone | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <main class="auth-shell">
    <div class="x-mark">X</div>
    <h1 id="authTitle" class="auth-title">Sign in to X</h1>

    <div class="auth-toggle">
      <button id="loginToggle" class="toggle-btn active" type="button">Login</button>
      <button id="signupToggle" class="toggle-btn" type="button">Sign Up</button>
    </div>

    <div id="messageBox" class="message-box"></div>

    <form id="authForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="emailInput">Email</label>
        <input id="emailInput" type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label" for="passwordInput">Password</label>
        <input id="passwordInput" type="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button id="submitBtn" type="submit" class="btn-auth">Log in</button>
    </form>

    <p class="auth-helper">
      <span id="helperText">Don't have an account?</span>
      <button id="helperToggle" type="button">Create one</button>
    </p>
  </main>

  <script src="login.js"></script>
</body>

</html>
